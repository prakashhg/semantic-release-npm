
# .gitlab-ci.yml (Docker-in-Docker)
stages: [build]

variables:
  # DinD defaults
  DOCKER_TLS_CERTDIR: ""            # disable TLS for DinD (simplifies CI)
  DOCKER_HOST: tcp://docker:2375
  DOCKER_DRIVER: overlay2
  # Tag policy:
  # - tags:          use git tag
  # - default branch use 'latest'
  # - other branches use the branch slug
  DEFAULT_BRANCH: $CI_DEFAULT_BRANCH

build_and_push:
  stage: build
  image: docker:24-cli
  services:
    - name: docker:24-dind
      command: ["--tls=false"]
  before_script:
    # Login to GitLab Container Registry (built-in CI vars)
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    # Decide our tag
    - |
      if [[ -n "$CI_COMMIT_TAG" ]]; then
        EXPORT_TAG="$CI_COMMIT_TAG"
      elif [[ "$CI_COMMIT_BRANCH" == "$DEFAULT_BRANCH" ]]; then
        EXPORT_TAG="latest"
      else
        EXPORT_TAG="$CI_COMMIT_REF_SLUG"
      fi
      echo "USING TAG: $EXPORT_TAG"
      echo "EXPORT_TAG=$EXPORT_TAG" >> $CI_JOB_STAGE # no-op; just for logs
  script:
    # Build (two tags: the chosen tag and the short SHA)
    - docker build --pull -t "$CI_REGISTRY_IMAGE:$EXPORT_TAG" -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA" .
    # Push both tags
    - docker push "$CI_REGISTRY_IMAGE:$EXPORT_TAG"
    - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
    - echo "Pushed:"
    - echo " - $CI_REGISTRY_IMAGE:$EXPORT_TAG"
    - echo " - $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
  rules:
    # Run on:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  # Optional: only rebuild when Docker context changes
  # only:
  #   changes:
  #     - Dockerfile
  #     - docker/**/*
