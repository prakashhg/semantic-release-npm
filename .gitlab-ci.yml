
default:
  image: node:20
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths: [ .npm/ ]

# GitLab's documented semantic-release example adapted for Node 20
# https://docs.gitlab.com/ci/examples/semantic-release/
before_script:
  - npm ci --cache .npm --prefer-offline
  - |
    {
      # Tell npm to publish to THIS project registry & auth with CI_JOB_TOKEN
      echo "@${CI_PROJECT_ROOT_NAMESPACE}:registry=${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/npm/"
      echo "${CI_API_V4_URL#https?}/projects/${CI_PROJECT_ID}/packages/npm/:_authToken=\${CI_JOB_TOKEN}"
    } | tee -a .npmrc

workflow:
  rules:
    - if: $CI_COMMIT_BRANCH

variables:
  NPM_TOKEN: "glpat-xQZMsk03TvhLFAGZMAh7hm86MQp1Omo3Mml5Cw.01.121utkgiz"

stages: [ release ]

publish:
  stage: release
  script:
    - npx semantic-release
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
